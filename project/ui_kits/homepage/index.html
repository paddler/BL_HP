<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BroadLight — Homepage UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', Meiryo, sans-serif; overflow-x: hidden; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(4deg); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Wave divider */
    .wave-divider {
      height: 120px;
      background: linear-gradient(180deg, #55D9FF 0%, #2A69E8 100%);
      position: relative; overflow: hidden;
    }
    .wave-divider::before {
      content: ''; position: absolute;
      width: 200%; height: 100%;
      background: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
      animation: wave 20s linear infinite;
    }
    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    /* Scroll padding for fixed header */
    html { scroll-padding-top: 70px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="CompanyInfo.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const [activeSection, setActiveSection] = React.useState('hero');

      React.useEffect(() => {
        const sections = ['hero','company','services','contact'];
        const onScroll = () => {
          const scrollY = window.scrollY + 100;
          for (let i = sections.length - 1; i >= 0; i--) {
            const el = document.getElementById(sections[i]);
            if (el && el.offsetTop <= scrollY) {
              setActiveSection(sections[i]);
              break;
            }
          }
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const scrollToContact = () =>
        window.scrollTo({ top: document.getElementById('contact').offsetTop - 70, behavior: 'smooth' });

      return (
        <>
          <Header activeSection={activeSection} />
          <main style={{ paddingTop: 0 }}>
            <Hero onCTAClick={scrollToContact} />
            <CompanyInfo />
            <Services />
            <div className="wave-divider" />
            <Contact />
            <Footer />
          </main>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 20px; background: #F7FBFF; font-family: var(--font-sans); display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.label { font-size: 10px; font-weight: 700; color: #8899bb; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

/* Primary CTA */
.btn-primary {
  display: inline-block;
  padding: 1rem 2.5rem;
  background: linear-gradient(135deg, #23C9F3 0%, #1662D9 100%);
  color: #fff; font-size: 1rem; font-weight: 700;
  border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 8px 20px rgba(35,201,243,0.4);
  transition: all 0.3s ease;
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(35,201,243,0.6); }

/* Ghost */
.btn-ghost {
  display: inline-block;
  padding: 0.9rem 2.2rem;
  background: rgba(255,255,255,0.12);
  color: #fff; font-size: 1rem; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 50px; cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}
.btn-ghost:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

/* Small */
.btn-sm {
  display: inline-block;
  padding: 0.5rem 1.4rem;
  background: linear-gradient(135deg, #23C9F3 0%, #1662D9 100%);
  color: #fff; font-size: 0.85rem; font-weight: 600;
  border-radius: 50px; border: none; cursor: pointer;
  box-shadow: 0 4px 12px rgba(35,201,243,0.3);
}

.dark-bg { background: linear-gradient(135deg,#0A3FBF,#1662D9); padding: 18px; border-radius: 12px; }
</style></head>
<body>
<div>
  <div class="label">Primary CTA</div>
  <button class="btn-primary">送信する</button>
</div>
<div class="dark-bg">
  <div class="label" style="color:rgba(255,255,255,0.6)">Ghost (on dark)</div>
  <button class="btn-ghost">お問い合わせ</button>
</div>
<div>
  <div class="label">Small</div>
  <button class="btn-sm">詳しく見る</button>
</div>
</body></html>

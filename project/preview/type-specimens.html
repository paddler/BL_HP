<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 20px; background: #F7FBFF; font-family: var(--font-sans); }
.block { margin-bottom: 18px; }
.label { font-size: 10px; font-weight: 700; color: #8899bb; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-family: monospace; }

/* On white / light */
.on-light { background: #fff; padding: 16px 18px; border-radius: 12px; border: 1px solid #e4eef8; }
/* On dark */
.on-dark { background: linear-gradient(135deg, #0A3FBF, #1662D9 60%, #23C9F3); padding: 16px 18px; border-radius: 12px; }
</style></head>
<body>
<div class="block">
  <div class="label">Heading on light background</div>
  <div class="on-light">
    <div style="font-size:1.6rem;font-weight:700;color:#0C1837;line-height:1.3">会社情報</div>
    <div style="font-size:1rem;line-height:1.9;color:#2E3A52;margin-top:8px">BroadLightは、最先端のAI技術を活用し、企業の持続的な成長と革新を支援します。</div>
    <div style="font-size:1rem;font-weight:600;color:#1662D9;margin-top:12px;padding-top:10px;border-top:2px solid rgba(22,98,217,0.2)">ミッション：AIで未来を拓き、社会に貢献する</div>
  </div>
</div>
<div class="block">
  <div class="label">Heading + body on dark/gradient background</div>
  <div class="on-dark">
    <div style="font-size:1.6rem;font-weight:700;color:#fff;line-height:1.3">事業領域</div>
    <div style="font-size:1rem;line-height:1.8;color:rgba(255,255,255,0.9);margin-top:8px">業務プロセスの自動化とワークフロー改善により、生産性向上とコスト削減を実現します。</div>
  </div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 20px; background: #F7FBFF; font-family: var(--font-sans); }
.swatches { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { width: 64px; text-align: center; }
.swatch-color { height: 48px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.swatch-label { font-size: 10px; color: #2E3A52; margin-top: 5px; font-weight: 600; }
.swatch-hex { font-size: 9px; color: #6b7a99; font-family: monospace; }
.row-label { font-size: 11px; font-weight: 700; color: #0C1837; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.08em; }
</style></head>
<body>
<div class="row-label">Brand Blues</div>
<div class="swatches">
  <div class="swatch"><div class="swatch-color" style="background:#EAF7FF;border:1px solid #dde9f5"></div><div class="swatch-label">50</div><div class="swatch-hex">#EAF7FF</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#C8EEFF"></div><div class="swatch-label">100</div><div class="swatch-hex">#C8EEFF</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#93D9FF"></div><div class="swatch-label">200</div><div class="swatch-hex">#93D9FF</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#56E0FF"></div><div class="swatch-label">300</div><div class="swatch-hex">#56E0FF</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#23C9F3"></div><div class="swatch-label">400</div><div class="swatch-hex">#23C9F3</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1D78E5"></div><div class="swatch-label">500</div><div class="swatch-hex">#1D78E5</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1662D9"></div><div class="swatch-label">600 ★</div><div class="swatch-hex">#1662D9</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1347C8"></div><div class="swatch-label">700</div><div class="swatch-hex">#1347C8</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#0A3FBF"></div><div class="swatch-label">800</div><div class="swatch-hex">#0A3FBF</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#0B2E9B"></div><div class="swatch-label">900</div><div class="swatch-hex">#0B2E9B</div></div>
</div>
<div class="row-label">Navy / Dark</div>
<div class="swatches">
  <div class="swatch"><div class="swatch-color" style="background:#2E3A52"></div><div class="swatch-label">text</div><div class="swatch-hex">#2E3A52</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1132A6"></div><div class="swatch-label">700</div><div class="swatch-hex">#1132A6</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#0C1837"></div><div class="swatch-label">800</div><div class="swatch-hex">#0C1837</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#0E245F"></div><div class="swatch-label">900</div><div class="swatch-hex">#0E245F</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#091A4D"></div><div class="swatch-label">950</div><div class="swatch-hex">#091A4D</div></div>
  <div class="swatch"><div class="swatch-color" style="background:#2B1E67"></div><div class="swatch-label">purple</div><div class="swatch-hex">#2B1E67</div></div>
</div>
</body></html>

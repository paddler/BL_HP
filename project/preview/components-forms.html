<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 20px; background: linear-gradient(135deg,#1132A6,#0F4FBF,#2A69E8); font-family: var(--font-sans); }
.form-group { margin-bottom: 14px; }
label { display: block; color: #fff; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
input, textarea {
  width: 100%; box-sizing: border-box;
  padding: 0.85rem 1.2rem;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px; font-size: 0.9rem;
  font-family: var(--font-sans);
  background: rgba(255,255,255,0.95);
  transition: all 0.3s ease;
  color: #2E3A52;
}
input:focus, textarea:focus {
  outline: none;
  border-color: #56E0FF;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(86,224,255,0.2);
}
textarea { min-height: 80px; resize: vertical; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style></head>
<body>
<div class="row">
  <div class="form-group"><label>お名前</label><input type="text" placeholder="山田 太郎"></div>
  <div class="form-group"><label>会社名</label><input type="text" placeholder="株式会社〇〇"></div>
</div>
<div class="form-group"><label>メールアドレス</label><input type="email" placeholder="info@example.co.jp"></div>
<div class="form-group"><label>お問い合わせ内容</label><textarea placeholder="ご質問・ご相談内容をご記入ください"></textarea></div>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 20px; background: #F7FBFF; font-family: var(--font-sans); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grad { border-radius: 14px; height: 72px; display: flex; align-items: flex-end; padding: 10px 12px; }
.grad-label { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
.name { font-size: 10px; color: #6b7a99; margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
</style></head>
<body>
<div class="grid">
  <div>
    <div class="grad" style="background: linear-gradient(135deg, #0A3FBF 0%, #1662D9 40%, #23C9F3 80%, #56E0FF 100%)"><span class="grad-label">Hero</span></div>
    <div class="name">Hero</div>
  </div>
  <div>
    <div class="grad" style="background: linear-gradient(135deg, #0B2E9B 0%, #1347C8 40%, #1D78E5 70%, #55D9FF 100%)"><span class="grad-label">Services</span></div>
    <div class="name">Services</div>
  </div>
  <div>
    <div class="grad" style="background: linear-gradient(135deg, #1132A6 0%, #0F4FBF 50%, #2A69E8 100%)"><span class="grad-label">Contact</span></div>
    <div class="name">Contact</div>
  </div>
  <div>
    <div class="grad" style="background: linear-gradient(135deg, #091A4D 0%, #0E245F 50%, #2B1E67 100%)"><span class="grad-label">Footer</span></div>
    <div class="name">Footer</div>
  </div>
  <div>
    <div class="grad" style="background: linear-gradient(135deg, #23C9F3 0%, #1662D9 100%)"><span class="grad-label">CTA Button</span></div>
    <div class="name">CTA Button</div>
  </div>
  <div>
    <div class="grad" style="background: linear-gradient(180deg, #EAF7FF 0%, #F7FBFF 100%); border: 1px solid #ddeef8"><span class="grad-label" style="color:#2E3A52; text-shadow:none">Light BG</span></div>
    <div class="name">Light BG</div>
  </div>
</div>
</body></html>

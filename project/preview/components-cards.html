<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 20px; background: #F7FBFF; font-family: var(--font-sans); display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
.label { font-size: 10px; font-weight: 700; color: #8899bb; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

/* Light card */
.card-light {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-radius: 24px; padding: 24px 22px;
  box-shadow: 0 10px 50px rgba(10,63,191,0.15);
  border: 1px solid rgba(255,255,255,0.5);
  max-width: 220px;
}
.card-light h3 { font-size: 1rem; font-weight: 700; color: #0C1837; margin-bottom: 8px; }
.card-light p { font-size: 0.85rem; color: #2E3A52; line-height: 1.7; margin: 0; }

/* Dark glass card */
.dark-bg { background: linear-gradient(135deg,#0B2E9B,#1D78E5); padding: 20px; border-radius: 14px; }
.card-dark {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  border-radius: 20px; padding: 22px 20px;
  border: 1px solid rgba(255,255,255,0.2);
  max-width: 200px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card-dark:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); background: rgba(255,255,255,0.18); }
.card-dark h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
.card-dark p { font-size: 0.82rem; color: rgba(255,255,255,0.9); line-height: 1.7; margin: 0; }
.icon { font-size: 2rem; margin-bottom: 10px; display: block; }
</style></head>
<body>
<div>
  <div class="label">Light Card</div>
  <div class="card-light">
    <h3>会社情報</h3>
    <p>BroadLightは、最先端のAI技術を活用し、企業の持続的な成長と革新を支援します。</p>
  </div>
</div>
<div>
  <div class="label">Service Card (dark glass)</div>
  <div class="dark-bg">
    <div class="card-dark">
      <span class="icon">🤖</span>
      <h3>自動化実装・運用</h3>
      <p>業務プロセスの自動化とワークフロー改善により、生産性向上を実現します。</p>
    </div>
  </div>
</div>
</body></html>

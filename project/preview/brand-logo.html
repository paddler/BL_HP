<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 24px; background: #F7FBFF; font-family: var(--font-sans); display: flex; gap: 30px; align-items: center; }
img { width: 120px; height: 120px; object-fit: contain; }
.on-dark { background: linear-gradient(135deg,#091A4D,#0E245F); padding: 18px; border-radius: 12px; }
.label { font-size: 10px; font-weight: 700; color: #8899bb; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
</style></head>
<body>
<div>
  <div class="label">On light</div>
  <img src="../assets/BL_logo.png" alt="BroadLight logo">
</div>
<div class="on-dark">
  <div class="label" style="color:rgba(255,255,255,0.5)">On dark</div>
  <img src="../assets/BL_logo.png" alt="BroadLight logo">
</div>
</body></html>
